name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for Cloud9. Please provide details about what you'd like to see.

  - type: textarea
    attributes:
      label: Summary
      description: A clear description of the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Use Case
      description: What problem does this feature solve? How would you use it?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?
    validations:
      required: false

  - type: textarea
    attributes:
      label: Alternatives
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Any other information that might be relevant (links, examples, etc.)
    validations:
      required: false
