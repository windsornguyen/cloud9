name: Bug Report
description: Report an error or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug in Cloud9. Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    attributes:
      label: Summary
      description: A clear description of the bug, including a minimal reproducible example if possible.
    validations:
      required: true

  - type: input
    attributes:
      label: Cloud9 Version
      description: What version of Cloud9 are you using?
      placeholder: e.g., 0.1.0, main branch commit hash
    validations:
      required: true

  - type: input
    attributes:
      label: Platform
      description: What operating system and architecture are you using?
      placeholder: e.g., macOS 14 arm64, Ubuntu 22.04 x86_64, Windows 11 x86_64
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start Cloud9 with...
        2. Execute query...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and logs.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional Context
      description: Any other information that might be relevant (logs, configuration, etc.)
    validations:
      required: false
